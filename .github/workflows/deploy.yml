name: AWS EC2 Continuous Deployment

on:
  push:
    branches:
      - main
      - developed

jobs:
  test:
    name: Phase 1 - Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install & Run Server Tests
        run: |
          cd server
          npm ci
          npx prisma generate
          npm run test

      - name: Install & Run Client Tests
        run: |
          cd client
          npm ci
          npm run test

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Scripts via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e # Exit immediately if any command fails
            echo "🚀 Starting Deployment on AWS EC2..."
            
            cd ~/DevOps-2026-learning
            
            # 1. Safety Backup
            echo "💾 Backing up database..."
            cp server/prisma/dev.db server/prisma/dev.db.bak || true
            
            # 2. Force-sync with the latest repository state
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Restore the database
            if [ -f server/prisma/dev.db.bak ]; then
              echo "🩹 Restoring database..."
              mv server/prisma/dev.db.bak server/prisma/dev.db
            fi
            
            # 4. Securely build and restart the Backend (Server)
            echo "📦 Building Backend..."
            cd server
            npm ci
            npx prisma generate
            npx prisma db push --accept-data-loss
            
            # Restart PM2 process
            pm2 restart backend || pm2 start src/index.js --name "backend"
            
            # 5. Securely build the Frontend (Client)
            echo "📦 Building Frontend..."
            cd ../client
            npm ci
            npm run build
            
            echo "✅ Deployment Successful!"
