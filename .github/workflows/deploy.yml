name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
      - developed

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: shopsmart-app

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: shopsmart
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and test backend
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/shopsmart
        run: |
          cd server
          npm ci
          npm run prisma:generate
          npm run prisma:migrate:deploy
          npm run lint
          npm run test

      - name: Install and test frontend
        env:
          VITE_API_URL: /api
        run: |
          cd client
          npm ci
          npm run lint
          npm run test -- --run

      - name: Install Playwright browsers
        run: |
          cd client
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          PORT: 5005
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/shopsmart
          VITE_API_URL: /api
        run: |
          cd client
          npm run e2e

  terraform:
    name: Terraform Apply
    needs: test
    runs-on: ubuntu-latest
    outputs:
      ecs_cluster_name: ${{ steps.tf-outputs.outputs.ecs_cluster_name }}
      ecs_service_name: ${{ steps.tf-outputs.outputs.ecs_service_name }}
      ecs_task_definition_family: ${{ steps.tf-outputs.outputs.ecs_task_definition_family }}
      ecr_repository_url: ${{ steps.tf-outputs.outputs.ecr_repository_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init, plan, and apply
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          RDS_DB_PASSWORD: ${{ secrets.RDS_DB_PASSWORD }}
        run: |
          cd terraform
          export TF_VAR_db_password="${RDS_DB_PASSWORD:-ShopSmartPass2026}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_BUCKET="shopsmart-tf-state-${ACCOUNT_ID}"

          if ! aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            echo "Creating Terraform state bucket: $STATE_BUCKET"
            aws s3api create-bucket --bucket "$STATE_BUCKET" --region "${{ secrets.AWS_REGION }}" $(if [ "${{ secrets.AWS_REGION }}" != "us-east-1" ]; then echo "--create-bucket-configuration LocationConstraint=${{ secrets.AWS_REGION }}"; fi)
            aws s3api put-bucket-versioning --bucket "$STATE_BUCKET" --versioning-configuration Status=Enabled
          fi

          terraform init \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=shopsmart/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"
          terraform validate
          terraform plan -out=tfplan
          terraform apply -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf-outputs
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          RDS_DB_PASSWORD: ${{ secrets.RDS_DB_PASSWORD }}
        run: |
          cd terraform
          export TF_VAR_db_password="${RDS_DB_PASSWORD:-ShopSmartPass2026}"
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecs_service_name=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"
          echo "ecs_task_definition_family=$(terraform output -raw ecs_task_definition_family)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

  build:
    name: Docker Build and Push
    needs: terraform
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          IMAGE_URI_LATEST="$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker build -t "$IMAGE_URI" -t "$IMAGE_URI_LATEST" .
          docker push "$IMAGE_URI"
          docker push "$IMAGE_URI_LATEST"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to ECS
    needs:
      - terraform
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Render task definition with the new image
        env:
          ECS_TASK_DEFINITION_FAMILY: ${{ needs.terraform.outputs.ecs_task_definition_family }}
          IMAGE_URI: ${{ needs.build.outputs.image_uri }}
        run: |
          aws ecs describe-task-definition --task-definition "$ECS_TASK_DEFINITION_FAMILY" --query taskDefinition > task-definition.json
          jq --arg IMAGE_URI "$IMAGE_URI" '
            .containerDefinitions[0].image = $IMAGE_URI
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' task-definition.json > task-definition-rendered.json

      - name: Register new task definition revision
        id: register-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://task-definition-rendered.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_definition_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy task definition to ECS service
        env:
          ECS_CLUSTER_NAME: ${{ needs.terraform.outputs.ecs_cluster_name }}
          ECS_SERVICE_NAME: ${{ needs.terraform.outputs.ecs_service_name }}
          TASK_DEFINITION_ARN: ${{ steps.register-task-def.outputs.task_definition_arn }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER_NAME" \
            --service "$ECS_SERVICE_NAME" \
            --task-definition "$TASK_DEFINITION_ARN" \
            --force-new-deployment
          aws ecs wait services-stable --cluster "$ECS_CLUSTER_NAME" --services "$ECS_SERVICE_NAME"

      - name: ECS diagnostics on failure
        if: failure()
        env:
          ECS_CLUSTER_NAME: ${{ needs.terraform.outputs.ecs_cluster_name }}
          ECS_SERVICE_NAME: ${{ needs.terraform.outputs.ecs_service_name }}
        run: |
          aws ecs describe-services --cluster "$ECS_CLUSTER_NAME" --services "$ECS_SERVICE_NAME"
          TASK_ARNS=$(aws ecs list-tasks --cluster "$ECS_CLUSTER_NAME" --service-name "$ECS_SERVICE_NAME" --desired-status STOPPED --query 'taskArns' --output text)
          if [ -n "$TASK_ARNS" ]; then
            aws ecs describe-tasks --cluster "$ECS_CLUSTER_NAME" --tasks $TASK_ARNS
          fi
