name: CI/CD Pipeline
on:
  push:
    branches:
      - main
      - developed

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: "shopsmart-app"

jobs:
  test:
    name: Phase 1 - Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Run Server Tests
        run: |
          cd server
          npm ci
          npx prisma generate
          npm run test
      
      - name: Server Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-report
          path: server/coverage/
          # Assuming jest is configured to generate coverage

      - name: Install & Run Client Tests
        run: |
          cd client
          npm ci
          npm run test
          
      - name: Client Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-test-report
          path: client/coverage/

  terraform:
    name: Phase 2 - Infrastructure Provisioning
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        run: |
          cd terraform
          # Fetch AWS Account ID to create a globally unique state bucket
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_BUCKET="shopsmart-tf-state-${ACCOUNT_ID}"
          
          # Check if the state bucket exists, if not, create it
          if ! aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            echo "Creating Terraform state bucket: $STATE_BUCKET"
            aws s3api create-bucket --bucket "$STATE_BUCKET" --region ${{ secrets.AWS_REGION }} $(if [ "${{ secrets.AWS_REGION }}" != "us-east-1" ]; then echo "--create-bucket-configuration LocationConstraint=${{ secrets.AWS_REGION }}"; fi)
            # Enable versioning on the state bucket
            aws s3api put-bucket-versioning --bucket "$STATE_BUCKET" --versioning-configuration Status=Enabled
          fi
          
          echo "Initializing Terraform with S3 backend..."
          terraform init \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=shopsmart/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"
            
          terraform validate
          terraform plan
          terraform apply -auto-approve

  build-and-deploy:
    name: Phase 3 - Container Build and ECS Deployment
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          # Build Docker image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          # Push image to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update ECS Service
        run: |
          aws ecs update-service --cluster shopsmart-cluster --service shopsmart-service --force-new-deployment
          aws ecs wait services-stable --cluster shopsmart-cluster --services shopsmart-service
