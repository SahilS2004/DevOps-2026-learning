name: AWS EC2 Continuous Deployment


# Trigger deployment only on pushes to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Scripts via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          # These secrets must be defined in your GitHub Repository Settings!
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e # Exit immediately if any command fails
            echo "🚀 Starting Deployment on AWS EC2..."
            
            cd ~/DevOps-2026-learning
            
            # 1. Safety Backup: Prevent dev.db from being deleted during the git reset
            echo "💾 Backing up database..."
            cp server/prisma/dev.db server/prisma/dev.db.bak || true
            
            # 2. Force-sync with the latest repository state
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Restore the database if it was removed during sync
            if [ -f server/prisma/dev.db.bak ]; then
              echo "🩹 Restoring database..."
              mv server/prisma/dev.db.bak server/prisma/dev.db
            fi
            
            # 4. Securely build and restart the Backend (Server)
            echo "📦 Building Backend..."
            cd server
            npm ci
            npx prisma generate
            npx prisma db push --accept-data-loss
            
            # Restart PM2 process (assumes you started it earlier with pm2 start src/index.js --name "backend")
            pm2 restart backend || pm2 start src/index.js --name "backend"
            
            # 4. Securely build the Frontend (Client)
            echo "📦 Building Frontend..."
            cd ../client
            npm ci
            npm run build
            
            # (If you serve the client using Nginx, adjusting the build folder is native and automatic)
            
            echo "✅ Deployment Successful!"
