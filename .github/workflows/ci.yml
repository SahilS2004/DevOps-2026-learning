name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Run Linter
        run: npm run lint
        
      - name: Run Tests
        run: npm run test

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Linter
        run: npm run lint
        
      - name: Run Tests
        # Vite's vitest automatically detects the GitHub Actions CI environment
        # and runs in non-watch (single run) mode by default.
        run: npm run test

  e2e-ci:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          
      - name: Install Server Dependencies
        env:
          DATABASE_URL: "file:./dev.db"
        run: |
          cd server
          npm ci
          npx prisma generate
          npx prisma db push --accept-data-loss
          
      - name: Install Client Dependencies
        run: |
          cd client
          npm ci
          
      - name: Install Playwright Browsers
        run: |
          cd client
          npx playwright install --with-deps chromium
          
      - name: Run Playwright E2E
        env:
          PORT: 5005
          DATABASE_URL: "file:./dev.db"
          VITE_API_URL: "http://localhost:5005/api"
        run: |
          cd client
          npm run e2e